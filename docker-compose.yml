services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recruitops
      POSTGRES_USER: recruitops
      POSTGRES_PASSWORD: recruitops_dev_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruitops -d recruitops"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://recruitops:recruitops_dev_password@postgres:5432/recruitops
      JWT_SECRET: local-development-secret-change-before-prod
      CORS_ORIGIN: http://localhost:5173
      AI_PROVIDER: deterministic
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"

volumes:
  postgres-data:
